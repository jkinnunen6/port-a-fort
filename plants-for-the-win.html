<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Plants For the Win — Case Study</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <site-header></site-header>

  <!-- HERO -->
  <div class="project-hero">
    <div class="placeholder-img">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      <span>Hero Image</span>
    </div>
  </div>

  <!-- INTRO -->
  <section class="project-intro">
    <div class="project-meta">
      <div class="meta-item">
        <span class="meta-label">Project</span>
        <span class="meta-value">Plants For the Win</span>
      </div>
      <div class="meta-item">
        <span class="meta-label">Type</span>
        <span class="meta-value">Web Design / UI</span>
      </div>
      <div class="meta-item">
        <span class="meta-label">Year</span>
        <span class="meta-value">2025</span>
      </div>
    </div>
    <div class="project-description">
      <p>Write your project description here. Describe the brief, the problem you were solving, and your approach. This is a good place to give context before the visuals.</p>
    </div>
  </section>

  <div class="project-divider"></div>

  <!-- DESKTOP + MOBILE SIDE BY SIDE -->
  <section class="project-screens">
    <div class="screen-pair">
      <div class="screen screen--desktop">
        <div class="placeholder-img">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          <span>Desktop</span>
        </div>
        <p class="screen-caption">Desktop Experience</p>
      </div>
  <div class="screen screen--mobile">
  <div class="phone-frame">
    <div class="phone-screen">
      <img src="images/PFTW-Header.png" alt="" />
      <img src="images/PFTW-Hero.gif" alt="" />
      <img src="images/PFTW-Body.png" alt="" />
      <img src="images/PFTW-mobile-team.gif" alt="" />
      <img src="images/PFTW-Footer.png" alt="" />
    </div>
    <img src="images/phonemock.png" alt="iPhone frame" class="phone-bezel" />
  </div>
  <p class="screen-caption">Mobile Experience</p>
</div>
    </div>
  </section>

  <!-- BACK LINK -->
  <div class="project-back">
    <a href="index.html">← Back to Work</a>
  </div>

  <site-footer></site-footer>
  <script src="components.js"></script>

<script>
  const phoneFrame  = document.querySelector('.phone-frame');
  const phoneScreen = document.querySelector('.phone-screen');
  let currentScroll = 0;

  phoneFrame.addEventListener('wheel', (e) => {
    e.preventDefault();

    const containerH = phoneFrame.querySelector('.phone-bezel').offsetHeight * 0.91;
    const totalH     = Array.from(phoneScreen.children)
                         .reduce((sum, img) => sum + img.offsetHeight, 0);
    const maxScroll  = totalH - containerH;

    currentScroll = Math.min(Math.max(currentScroll + e.deltaY, 0), maxScroll);
    phoneScreen.style.transform = `translateY(-${currentScroll}px)`;
  }, { passive: false });
</script>

</body>
</html>
