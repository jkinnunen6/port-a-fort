  <div class="carousel">

  <site-footer></site-footer>
  <script src="components.js"></script>

  <script>

  // ── Phone scroll ─────────────────────────────
  const desktopFrame  = document.querySelector('.desktop-frame');
  const desktopScreen = document.querySelector('.desktop-screen-inner');
  let currentScroll = 0;

  desktopFrame.addEventListener('wheel', (e) => {
    e.preventDefault();
    const containerH = document.querySelector('.desktop-screen').offsetHeight;
    const totalH     = Array.from(desktopScreen.children)
                         .reduce((sum, img) => sum + img.offsetHeight, 0);
    const maxScroll  = totalH - containerH;
    currentScroll = Math.min(Math.max(currentScroll + e.deltaY, 0), maxScroll);
    desktopScreen.style.transform = `translateY(-${currentScroll}px)`;
  }, { passive: false });

</script>

<script>
  // ── Carousel ──────────────────────────────────
  const track   = document.querySelector('.carousel-track');
  const slides  = document.querySelectorAll('.carousel-slide');
  const dots    = document.querySelectorAll('.carousel-dot');
  const prevBtn = document.querySelector('.carousel-btn--prev');
  const nextBtn = document.querySelector('.carousel-btn--next');
  let current   = 0;

  function goTo(index) {
    current = (index + slides.length) % slides.length;
    track.style.transform = `translateX(-${current * 100}%)`;
    dots.forEach((dot, i) => dot.classList.toggle('is-active', i === current));
  }

  prevBtn.addEventListener('click', () => goTo(current - 1));
  nextBtn.addEventListener('click', () => goTo(current + 1));
  dots.forEach((dot, i) => dot.addEventListener('click', () => goTo(i)));

  // Swipe support for mobile
  let startX = 0;
  track.addEventListener('touchstart', e => startX = e.touches[0].clientX);
  track.addEventListener('touchend', e => {
    const diff = startX - e.changedTouches[0].clientX;
    if (Math.abs(diff) > 50) goTo(diff > 0 ? current + 1 : current - 1);
  });
</script>

</body>
</html>
