 <div id="cursor-dot"></div>
  <div id="cursor-ring"></div>
  <script>
    const dot  = document.getElementById('cursor-dot');
    const ring = document.getElementById('cursor-ring');

    // Current ring position (used for lerp)
    let ringX = 0, ringY = 0;
    // Target position (mouse)
    let mouseX = 0, mouseY = 0;

    // Lerp factor — lower = more lag (0.08–0.15 feels good)
    const LERP = 0.12;

    // ── Move dot instantly ──────────────────────────
    document.addEventListener('mousemove', (e) => {
      mouseX = e.clientX;
      mouseY = e.clientY;

      // Dot follows instantly
      dot.style.left = mouseX + 'px';
      dot.style.top  = mouseY + 'px';
    });

    // ── Animate ring with lerp ──────────────────────
    function animateRing() {
      // Lerp ring toward mouse
      ringX += (mouseX - ringX) * LERP;
      ringY += (mouseY - ringY) * LERP;

      ring.style.left = ringX + 'px';
      ring.style.top  = ringY + 'px';

      requestAnimationFrame(animateRing);
    }
    animateRing();

    // ── Hover state ─────────────────────────────────
    const interactables = 'a, button, [role="button"], input, textarea, select, label, .card';

    document.addEventListener('mouseover', (e) => {
      if (e.target.closest(interactables)) {
        dot.classList.add('is-hovering');
        ring.classList.add('is-hovering');
      }
    });

    document.addEventListener('mouseout', (e) => {
      if (e.target.closest(interactables)) {
        dot.classList.remove('is-hovering');
        ring.classList.remove('is-hovering');
      }
    });

    // ── Click state ──────────────────────────────────
    document.addEventListener('mousedown', () => ring.classList.add('is-clicking'));
    document.addEventListener('mouseup',   () => ring.classList.remove('is-clicking'));

    // ── Hide when leaving window ─────────────────────
    document.addEventListener('mouseleave', () => {
      dot.classList.add('is-hidden');
      ring.classList.add('is-hidden');
    });

    document.addEventListener('mouseenter', () => {
      dot.classList.remove('is-hidden');
      ring.classList.remove('is-hidden');
    });
  </script>
